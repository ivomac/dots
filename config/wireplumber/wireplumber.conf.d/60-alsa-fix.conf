monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "~alsa_output.pci-0000_07_00.1.*"
      }
    ]
    actions = {
      update-props = {
        api.alsa.period-size   = 1024
        api.alsa.period-num    = 3
        api.alsa.headroom      = 1024
        session.suspend-timeout-seconds = 0
      }
    }
  }
]
