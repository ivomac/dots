# Prefix (status bar shows while prefix is active)
set -g prefix None
set -g status off
bind -n C-s set status on \; switch-client -T prefix \; \
  run -b "sleep 2; tmux set -t'#{session_id}' status off"
bind -T prefix C-s display-popup -E "tmux-session"

# Core behavior
set -g mouse on
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g extended-keys on
set -ga terminal-features ",st-256color*:extended-keys"
set -g focus-events on
set -g default-terminal "st-256color"
set -ga terminal-overrides ",st-256color:Tc"

# Copy mode (vi keys)
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Last pane
bind C-S-^ last-pane

# New windows in current directory
bind c new-window -c "#{pane_current_path}"

# Lazygit / Yazi launchers
bind g new-window -c "#{pane_current_path}" -n lazygit lazygit
bind f new-window -c "#{pane_current_path}" -n yazi yazi

# Kill window
bind & confirm-before -p "kill window #W? (y/n)" kill-window

# Style
set -g window-style "bg=terminal"
set -g window-active-style "bg=terminal"
set -g pane-border-style "bg=terminal"
set -g pane-active-border-style "bg=terminal"
set -g status-style "bg=terminal"

# Status bar
set -g status-position bottom
set -g status-left ""
set -g status-right ""
set -g status-justify centre
set -g window-status-format "#I:#W"
set -g window-status-current-format "#[reverse]#I:#W#[default]"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# TPM auto-bootstrap
if "test ! -d ~/.config/tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm'"

run '~/.config/tmux/plugins/tpm/tpm'
